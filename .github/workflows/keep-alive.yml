name: Keep Supabase alive

on:
  schedule:
    # Every Sunday at 10:00 UTC — prevents free-tier 7-day pause
    - cron: '0 10 * * 0'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dev Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SUPABASE_DEV_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_DEV_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_DEV_ANON_KEY }}")
          echo "Dev Supabase health status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Unexpected dev status $STATUS" && exit 1
          fi

      - name: Ping prod Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SUPABASE_PROD_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_PROD_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PROD_ANON_KEY }}")
          echo "Prod Supabase health status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Unexpected prod status $STATUS" && exit 1
          fi
